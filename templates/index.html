<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DevOps Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #06b6d4;
            --accent-light: #22d3ee;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ========== HEADER ========== */
        header {
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--primary);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            border-radius: 20px;
            font-size: 0.875rem;
            color: var(--success);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ========== MAIN LAYOUT ========== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .intro {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .intro h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .intro p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* ========== CARD GRID ========== */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.8s ease-out;
            animation-fill-mode: both;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }

        .card:hover {
            border-color: var(--accent);
            background: rgba(30, 41, 59, 0.8);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(6, 182, 212, 0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid var(--accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* ========== TEXTAREA & INPUT ========== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.95rem;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(15, 23, 42, 0.7);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }

        textarea {
            min-height: 200px;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        /* ========== BUTTONS ========== */
        .button-group {
            display: flex;
            gap: 1rem;
        }

        button {
            flex: 1;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: var(--primary);
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(6, 182, 212, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(15, 23, 42, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        button.loading .spinner {
            display: block;
        }

        button.loading span {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== RESULTS ========== */
        .results-section {
            margin-top: 3rem;
        }

        .results-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }

        .results-icon {
            width: 40px;
            height: 40px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: var(--success);
        }

        .results-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .result-item {
            background: rgba(16, 185, 129, 0.05);
            border-left: 3px solid var(--success);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            animation: slideInLeft 0.5s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .result-query {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .result-answer {
            color: var(--text-primary);
            line-height: 1.8;
            font-size: 1rem;
        }

        .no-results {
            background: rgba(239, 68, 68, 0.05);
            border-left: 3px solid var(--error);
            padding: 1.5rem;
            border-radius: 8px;
            color: var(--text-secondary);
            text-align: center;
        }

        /* ========== STATS ========== */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
            padding-top: 3rem;
            border-top: 1px solid var(--border);
        }

        .stat-box {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            animation: fadeInUp 1s ease-out both;
        }

        .stat-box:nth-child(1) { animation-delay: 0.3s; }
        .stat-box:nth-child(2) { animation-delay: 0.4s; }
        .stat-box:nth-child(3) { animation-delay: 0.5s; }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ========== ERROR HANDLING ========== */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideDown 0.3s ease-out;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: #6ee7b7;
        }

        .alert-icon {
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .header-content {
                padding: 1rem;
            }

            .container {
                padding: 1.5rem;
            }

            .intro h1 {
                font-size: 2rem;
            }

            .card {
                padding: 1.5rem;
            }

            button {
                padding: 0.875rem 1.5rem;
                font-size: 0.95rem;
            }

            .button-group {
                flex-direction: column;
            }
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-content">
            <a href="/" class="logo">
                <div class="logo-icon">⚡</div>
                DevOps Analyzer
            </a>
            <div class="status-badge">
                <div class="status-dot"></div>
                System Online
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="container">
        <!-- INTRO -->
        <div class="intro">
            <h1>AI-Powered Log Analysis</h1>
            <p>Upload your DevOps logs and leverage AI to understand patterns, identify issues, and optimize your infrastructure.</p>
        </div>

        <!-- UPLOAD & QUERY CARDS -->
        <div class="card-grid">
            <!-- UPLOAD CARD -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">📤</div>
                    <h2 class="card-title">Upload Logs</h2>
                </div>
                <form id="uploadForm">
                    <div class="form-group">
                        <label class="form-label">Paste your logs here</label>
                        <textarea id="logInput" placeholder="Paste your Docker, Kubernetes, or application logs here..." required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span>Upload & Index</span>
                        <div class="spinner"></div>
                    </button>
                </form>
                <div id="uploadAlert" class="alert" style="display: none; margin-top: 1rem;"></div>
            </div>

            <!-- QUERY CARD -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">🔍</div>
                    <h2 class="card-title">Query Logs</h2>
                </div>
                <form id="queryForm">
                    <div class="form-group">
                        <label class="form-label">What do you want to know?</label>
                        <input type="text" id="queryInput" placeholder="e.g., What caused the service failure?" required>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span>Analyze & Get Insights</span>
                        <div class="spinner"></div>
                    </button>
                </form>
                <div id="queryAlert" class="alert" style="display: none; margin-top: 1rem;"></div>
            </div>
        </div>

        <!-- RESULTS SECTION -->
        <div id="resultsSection" class="results-section" style="display: none;">
            <div class="results-header">
                <div class="results-icon">✓</div>
                <h3 class="results-title">Analysis Results</h3>
            </div>
            <div id="resultsContainer"></div>
        </div>

        <!-- STATS SECTION -->
        <div class="stats-section">
            <div class="stat-box">
                <div class="stat-value" id="chunkCount">0</div>
                <div class="stat-label">Logs Indexed</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="queryCount">0</div>
                <div class="stat-label">Queries Processed</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">100%</div>
                <div class="stat-label">System Uptime</div>
            </div>
        </div>
    </div>

    <script>
        let stats = {
            chunksIndexed: 0,
            queriesProcessed: 0
        };

        // UPLOAD LOGS
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const logInput = document.getElementById('logInput');
            const uploadBtn = e.target.querySelector('button');
            const uploadAlert = document.getElementById('uploadAlert');

            uploadBtn.classList.add('loading');
            uploadBtn.disabled = true;

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ log: logInput.value })
                });

                const data = await response.json();

                if (response.ok) {
                    stats.chunksIndexed += data.chunks;
                    document.getElementById('chunkCount').textContent = stats.chunksIndexed;

                    showAlert(uploadAlert, 'success', `✓ ${data.message} (${data.chunks} chunks indexed)`);
                    logInput.value = '';
                } else {
                    showAlert(uploadAlert, 'error', `✗ ${data.detail || 'Upload failed'}`);
                }
            } catch (error) {
                showAlert(uploadAlert, 'error', `✗ Error: ${error.message}`);
            } finally {
                uploadBtn.classList.remove('loading');
                uploadBtn.disabled = false;
            }
        });

        // QUERY LOGS
        document.getElementById('queryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const queryInput = document.getElementById('queryInput');
            const queryBtn = e.target.querySelector('button');
            const queryAlert = document.getElementById('queryAlert');
            const resultsSection = document.getElementById('resultsSection');
            const resultsContainer = document.getElementById('resultsContainer');

            queryBtn.classList.add('loading');
            queryBtn.disabled = true;

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: queryInput.value })
                });

                const data = await response.json();

                if (response.ok) {
                    stats.queriesProcessed += 1;
                    document.getElementById('queryCount').textContent = stats.queriesProcessed;

                    // Display results
                    const isNoResults = data.answer.includes('No relevant logs');
                    const resultHTML = isNoResults 
                        ? `<div class="no-results">ℹ️ ${data.answer}</div>`
                        : `<div class="result-item">
                            <div class="result-query">Query: ${escapeHtml(data.query)}</div>
                            <div class="result-answer">${escapeHtml(data.answer)}</div>
                        </div>`;

                    resultsContainer.innerHTML = resultHTML;
                    resultsSection.style.display = 'block';
                    resultsSection.scrollIntoView({ behavior: 'smooth' });

                    queryAlert.style.display = 'none';
                } else {
                    showAlert(queryAlert, 'error', `✗ ${data.detail || 'Query failed'}`);
                }
            } catch (error) {
                showAlert(queryAlert, 'error', `✗ Error: ${error.message}`);
            } finally {
                queryBtn.classList.remove('loading');
                queryBtn.disabled = false;
            }
        });

        // HELPER FUNCTIONS
        function showAlert(element, type, message) {
            element.className = `alert alert-${type}`;
            element.innerHTML = `
                <div class="alert-icon">${type === 'success' ? '✓' : '⚠'}</div>
                <div>${message}</div>
            `;
            element.style.display = 'flex';
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
